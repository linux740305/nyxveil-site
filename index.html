<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>nyxveil</title>
  <style>
    :root {
      --bg: #f5efe4;
      --card: #fffaf2;
      --text: #1f2937;
      --accent: #f97316;
      --accent-dark: #c2410c;
      --line: #e5d7bf;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(249, 115, 22, 0.18), transparent 28%),
        linear-gradient(180deg, #fffaf5 0%, var(--bg) 100%);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    main {
      width: min(720px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 40px 28px;
      box-shadow: 0 20px 50px rgba(31, 41, 55, 0.08);
    }

    .tag {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 999px;
      background: rgba(249, 115, 22, 0.12);
      color: var(--accent-dark);
      font-size: 14px;
      font-weight: 700;
    }

    h1 {
      margin: 18px 0 12px;
      font-size: clamp(32px, 6vw, 56px);
      line-height: 1.05;
    }

    p {
      margin: 0;
      font-size: 18px;
      line-height: 1.7;
    }

    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 28px;
    }

    a {
      text-decoration: none;
      border-radius: 12px;
      padding: 12px 18px;
      font-weight: 700;
    }

    .primary {
      background: var(--accent);
      color: #fff;
    }

    .secondary {
      color: var(--text);
      border: 1px solid var(--line);
      background: #fff;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 14px;
      margin-top: 32px;
    }

    .item {
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 16px;
      background: rgba(255, 255, 255, 0.8);
    }

    .item strong {
      display: block;
      margin-bottom: 6px;
    }
  </style>
</head>
<body>
  <main>
    <span class="tag">Cloudflare Pages</span>
    <h1>nyxveil 已經可以直接部署</h1>
    <p>
      這是 `nyxveil` 的最小可用靜態網站範本。把目前資料夾連到 Cloudflare Pages，
      或直接上傳目前內容，就可以立即上線。
    </p>

    <div class="actions">
      <a class="primary" href="https://pages.cloudflare.com/" target="_blank" rel="noreferrer">前往 Cloudflare Pages</a>
      <a class="secondary" href="https://developers.cloudflare.com/pages/" target="_blank" rel="noreferrer">查看官方說明</a>
    </div>

    <section class="grid">
      <article class="item">
        <strong>首頁</strong>
        `index.html` 已建立完成。
      </article>
      <article class="item">
        <strong>可直接部署</strong>
        不需要額外 build 流程，這個專案只放公開網站檔案。
      </article>
      <article class="item">
        <strong>下一步</strong>
        直接把內容改成 `nyxveil` 的正式首頁。
      </article>
    </section>
  </main>
</body>
</html>
